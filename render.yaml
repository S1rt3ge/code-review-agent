services:
  - type: web
    name: code-review-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-agent-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FERNET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: code-review-agent-db
    databaseName: cra_db
    user: cra_user
    plan: free
