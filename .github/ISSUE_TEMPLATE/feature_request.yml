name: Feature request
description: Propose a new capability or improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please explain the user value and expected outcomes.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are we solving?
      placeholder: As a user, I cannot ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred approach
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options or workarounds

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Backend/frontend/API/data model impacts
      placeholder: |
        Backend:
        Frontend:
        Database:
        API:

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - nice-to-have
        - medium
        - high
        - critical
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues and discussions first
          required: true
