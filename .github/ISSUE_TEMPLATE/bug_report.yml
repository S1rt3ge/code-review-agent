name: Bug report
description: Report a reproducible problem or regression
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please provide clear reproduction steps and expected behavior.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short description of the problem
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version / commit
      placeholder: e.g. main@abcdef1

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python/Node versions, deployment platform
      placeholder: |
        OS:
        Browser:
        Python:
        Node:
        Deployment:

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs or attach screenshots if relevant

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I removed secrets/tokens from logs and screenshots
          required: true
