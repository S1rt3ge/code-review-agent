name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.3.0)"
        required: true
        type: string
      target:
        description: "Target branch for release"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release from main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Validate version tag format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}"
            echo "Expected: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Ensure target branch is main
        run: |
          if [[ "${{ inputs.target }}" != "main" ]]; then
            echo "Releases are allowed only from main"
            exit 1
          fi

      - name: Ensure target commit passed required checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Checking statuses for commit $SHA"
          STATE=$(gh api "repos/${{ github.repository }}/commits/$SHA/status" --jq '.state')
          if [[ "$STATE" != "success" ]]; then
            echo "Required status checks are not all successful for $SHA (state=$STATE)"
            exit 1
          fi

      - name: Check if tag already exists
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ inputs.version }}"
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --target "${{ inputs.target }}" \
            --title "${{ inputs.version }}" \
            --generate-notes
