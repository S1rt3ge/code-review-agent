name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.3.0)"
        required: true
        type: string
      target:
        description: "Target branch for release"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release from main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Validate version tag format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}"
            echo "Expected: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Ensure target branch is main
        run: |
          if [[ "${{ inputs.target }}" != "main" ]]; then
            echo "Releases are allowed only from main"
            exit 1
          fi

      - name: Ensure target commit passed required checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Checking required check-runs for commit $SHA"
          REQUIRED_CHECKS=(
            "Security Gates"
            "SBOM"
            "Backend Tests (Python 3.12)"
            "Frontend Build"
          )

          CHECK_RUNS=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs")

          for CHECK_NAME in "${REQUIRED_CHECKS[@]}"; do
            CONCLUSION=$(printf '%s' "$CHECK_RUNS" | jq -r --arg NAME "$CHECK_NAME" '.check_runs[] | select(.name == $NAME) | .conclusion' | head -n 1)
            STATUS=$(printf '%s' "$CHECK_RUNS" | jq -r --arg NAME "$CHECK_NAME" '.check_runs[] | select(.name == $NAME) | .status' | head -n 1)
            if [[ -z "$STATUS" ]]; then
              echo "Required check '$CHECK_NAME' is missing on commit $SHA"
              exit 1
            fi
            if [[ "$STATUS" != "completed" || "$CONCLUSION" != "success" ]]; then
              echo "Required check '$CHECK_NAME' is not successful (status=$STATUS conclusion=$CONCLUSION)"
              exit 1
            fi
          done

      - name: Ensure changelog contains unreleased release notes
        run: |
          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "CHANGELOG.md must contain an [Unreleased] section"
            exit 1
          fi

          if ! awk 'BEGIN { found=0; content=0 } /^## \[Unreleased\]/{ found=1; next } /^## \[/{ if (found) exit } found && NF { content=1 } END { exit(content ? 0 : 1) }' CHANGELOG.md; then
            echo "CHANGELOG.md [Unreleased] section must contain release notes before tagging"
            exit 1
          fi

      - name: Check if tag already exists
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ inputs.version }}"
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --target "${{ inputs.target }}" \
            --title "${{ inputs.version }}" \
            --generate-notes
