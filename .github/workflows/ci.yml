name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (repo + history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Verify requirements lock is up to date
        run: |
          pip install pip-tools
          pip-compile --quiet --generate-hashes --strip-extras --allow-unsafe --output-file requirements.txt requirements.in
          git update-index -q --refresh
          git diff --exit-code requirements.txt

      - name: Audit Python dependencies (high/critical)
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Audit npm dependencies (critical)
        run: npm audit --audit-level=critical
        working-directory: frontend

  sbom:
    name: SBOM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Generate Python SBOM
        run: cyclonedx-py requirements --output-file sbom-python.xml --output-format xml requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Generate frontend SBOM
        run: npm sbom --package-lock-only --sbom-format cyclonedx --omit dev > ../sbom-frontend.json
        working-directory: frontend

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-python.xml
            sbom-frontend.json

  backend-tests:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cra_user
          POSTGRES_PASSWORD: cra_password
          POSTGRES_DB: cra_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cra_user -d cra_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://cra_user:cra_password@localhost:5432/cra_db
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      FERNET_KEY: ${{ secrets.FERNET_KEY || 'dGVzdC1mZXJuZXQta2V5LTMyLWJ5dGVzLWxvbmchem8=' }}
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify requirements lock is up to date
        run: |
          pip install pip-tools
          pip-compile --quiet --generate-hashes --strip-extras --allow-unsafe --output-file requirements.txt requirements.in
          git update-index -q --refresh
          git diff --exit-code requirements.txt

      - name: Run migrations
        run: |
          pip install psycopg[binary]
          for f in supabase/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          DATABASE_URL: postgresql://cra_user:cra_password@localhost:5432/cra_db

      - name: Run tests
        run: |
          pytest -m "not integration" --tb=short -q
          pytest -m integration --tb=short -q

      - name: Run ruff
        run: ruff check backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Run frontend tests
        run: npm test -- --run
        working-directory: frontend
