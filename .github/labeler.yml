backend:
  - changed-files:
      - any-glob-to-any-file: "backend/**"

frontend:
  - changed-files:
      - any-glob-to-any-file: "frontend/**"

database:
  - changed-files:
      - any-glob-to-any-file: "supabase/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"
      - any-glob-to-any-file: ".github/labeler.yml"

documentation:
  - changed-files:
      - any-glob-to-any-file: "README.md"
      - any-glob-to-any-file: "docs/**"

dependencies:
  - changed-files:
      - any-glob-to-any-file: "requirements.txt"
      - any-glob-to-any-file: "frontend/package.json"
      - any-glob-to-any-file: "frontend/package-lock.json"
      - any-glob-to-any-file: ".github/dependabot.yml"
