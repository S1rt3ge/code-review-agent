services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cra_password}
      POSTGRES_DB: ${POSTGRES_DB:-cra_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cra_user} -d ${POSTGRES_DB:-cra_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - devtools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me-local-only}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cra_user}:${POSTGRES_PASSWORD:-cra_password}@postgres:5432/${POSTGRES_DB:-cra_db}
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "python scripts/migrate.py && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cra_user}:${POSTGRES_PASSWORD:-cra_password}@postgres:5432/${POSTGRES_DB:-cra_db}
      APP_ENV: test
      FERNET_KEY: ""
      JWT_SECRET: test-secret
      GITHUB_WEBHOOK_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "python scripts/migrate.py && pytest backend/tests/ -v"
    profiles:
      - test

volumes:
  postgres_data:
