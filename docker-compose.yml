version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cra_user
      POSTGRES_PASSWORD: cra_password
      POSTGRES_DB: cra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cra_user -d cra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://cra_user:cra_password@postgres:5432/cra_db
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://cra_user:cra_password@postgres:5432/cra_db
      APP_ENV: test
      FERNET_KEY: ""
      JWT_SECRET: test-secret
      GITHUB_WEBHOOK_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "python scripts/migrate.py && pytest backend/tests/ -v"
    profiles:
      - test

volumes:
  postgres_data:
